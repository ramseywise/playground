# Visualizer defaults — override at runtime via CLI flags or interactive prompts
defaults:
  audience: "mixed technical and product team (BE/FE/ML/AI engineers, PM, designer, data analyst)"
  use_template: true
  template_path: "template.pptx"
  model: "claude-sonnet-4-20250514"
  output:
    slides_dir: "output/slides"
    images_dir: "output/images"
  image:
    width: 1280
    height: 720
