services:
  librarian-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8000:8000"
    env_file: ../../.env
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s  # multilingual-e5-large loads ~45s on cold start

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      LIBRARIAN_API_URL: http://librarian-api:8000
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8501/_stcore/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      librarian-api:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:1.57
    profiles:
      - tracing
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC ingest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
