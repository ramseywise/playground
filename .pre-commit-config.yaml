repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=10000"]
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-ast
      - id: detect-private-key
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: ["--fix"]
        # hc-rag-agent uses stdlib logging — exclude until structlog migration is done
        exclude: ^hc-rag-agent/
      - id: ruff-format
        exclude: ^hc-rag-agent/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
        name: detect secrets (gitleaks)

  - repo: local
    hooks:
      - id: no-dotenv-staged
        name: .env not staged
        language: fail
        entry: ".env file must not be committed — use .env.example for templates"
        files: ^\.env$

      - id: no-plans-staged
        name: plans/ not staged
        language: fail
        entry: ".claude/docs/plans/ files are local-only and must not be committed"
        files: ^\.claude/docs/plans/

      - id: no-reviews-staged
        name: reviews/ not staged
        language: fail
        entry: ".claude/docs/reviews/ files are local-only and must not be committed"
        files: ^\.claude/docs/reviews/
