services:
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/containers/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash-lite}"
      BILLY_MCP_URL: "http://billy-mcp:8765/sse"
      FRONTEND_PORT: "3000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      billy-mcp:
        condition: service_healthy

  va-gateway-adk:
    build:
      context: ../..
      dockerfile: infrastructure/containers/va-gateway-adk/Dockerfile
    ports:
      - "8000:8000"
    environment:
      GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash-lite}"
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "8000"
      GATEWAY_API_KEY: "${GATEWAY_API_KEY:-}"
      BILLY_MCP_URL: "http://billy-mcp:8765/sse"
      BILLY_API_URL: "http://billy-mcp:8766"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      billy-mcp:
        condition: service_healthy

  va-gateway-lg:
    build:
      context: ../..
      dockerfile: infrastructure/containers/va-gateway-lg/Dockerfile
    ports:
      - "8001:8001"
    environment:
      GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash-lite}"
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "8001"
      GATEWAY_API_KEY: "${GATEWAY_API_KEY:-}"
      BILLY_MCP_URL: "http://billy-mcp:8765/sse"
      BILLY_API_URL: "http://billy-mcp:8766"
      LANGGRAPH_CHECKPOINTER: "${LANGGRAPH_CHECKPOINTER:-postgres}"
      POSTGRES_URL: "${POSTGRES_URL:-postgresql://va:${POSTGRES_PASSWORD:-va_dev}@postgres:5432/va_checkpoints}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      billy-mcp:
        condition: service_healthy
      postgres:
        condition: service_healthy

  billy-mcp:
    build:
      context: ../..
      dockerfile: infrastructure/containers/billy-mcp/Dockerfile
    ports:
      - "8765:8765"  # MCP SSE
      - "8766:8766"  # REST API / Swagger
    volumes:
      - billy-data:/data
    environment:
      BILLY_DB: "/data/billy.db"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8765"
      API_PORT: "8766"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8766/docs')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: va
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-va_dev}"
      POSTGRES_DB: va_checkpoints
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U va"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  billy-data:
  postgres-data:
