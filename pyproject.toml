[project]
name = "agents"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.88.0",
    "httpx>=0.27.0",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.0.0",
    "python-dotenv>=1.2.2",
    "python-pptx>=1.0.0",
    "pyyaml>=6.0",
    "rich>=13.0.0",
    "structlog>=25.5.0",
]

[project.optional-dependencies]
replicate = ["replicate>=1.0.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agents"]

[dependency-groups]
dev = ["pytest>=9.0.2", "pytest-mock>=3.15.1"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["integration: tests that hit real binaries or external services"]

[project.scripts]
research-agent = "agents.researcher.__main__:main"
presenter = "agents.presenter.__main__:main"
