[project]
name = "agents"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.88.0",
    "httpx>=0.27.0",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.0.0",
    "python-dotenv>=1.2.2",
    "python-pptx>=1.0.0",
    "pyyaml>=6.0",
    "rich>=13.0.0",
    "structlog>=25.5.0",
]

[project.optional-dependencies]
replicate = ["replicate>=1.0.0"]
librarian = [
    "langgraph>=0.4.0",
    # langchain-core is not a direct dependency; langgraph provides the message
    # reducer contract we use via its own state machine APIs.
    "opensearch-py>=2.7.0",
    "sentence-transformers>=3.0.0",
    "ragas>=0.2.0",
    "deepeval>=2.0.0",
    "langfuse>=2.0.0",
    # Storage + retrieval backends
    "chromadb>=0.6",
    "duckdb>=1.0",
    "numpy>=1.26",
    "scikit-learn>=1.4",
    "boto3>=1.35.0",
]
api = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "sse-starlette>=2.0.0",
]
playground = [
    "streamlit>=1.40.0",
]
lambda = [
    "mangum>=0.19.0",
]
mcp = [
    "mcp>=1.0.0",
    "snowflake-connector-python>=3.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agents", "src/core", "src/eval"]

[dependency-groups]
dev = [
    "duckdb>=1.5.1",
    "langgraph>=1.1.6",
    "numpy>=2.4.4",
    "pyright>=1.1.408",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-mock>=3.15.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["integration: tests that hit real binaries or external services"]

[project.scripts]
research-agent = "agents.researcher.__main__:main"
presenter = "agents.presenter.__main__:main"
cartographer = "agents.cartographer.__main__:main"
librarian-api = "agents.librarian.api.app:main"
mcp-snowflake = "agents.librarian.mcp.snowflake_server:main"
mcp-s3 = "agents.librarian.mcp.s3_server:main"
mcp-librarian = "agents.librarian.mcp.librarian_server:main"
